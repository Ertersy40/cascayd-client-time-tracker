<!DOCTYPE html>
<html>
<head>
  <title>cascayd time tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 24px;
      color: #fff;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }
    .date-selector {
      margin-bottom: 20px;
      padding: 15px;
      background: #1a1a1a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .date-selector input {
      padding: 8px 12px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
    .btn {
      padding: 8px 16px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #3a3a3a;
    }
    .btn-primary {
      background: #10b981;
      border-color: #10b981;
    }
    .btn-primary:hover {
      background: #059669;
    }
    .view-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .view-tab {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .view-tab:hover {
      background: #2a2a2a;
    }
    .view-tab.active {
      background: #10b981;
      border-color: #10b981;
      color: #000;
      font-weight: 600;
    }
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }
    .section {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }
    .big-time {
      font-size: 64px;
      font-weight: bold;
      color: #10b981;
      margin: 20px 0;
    }
    .sub-text {
      color: #888;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .time-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      margin-bottom: 8px;
      background: #2a2a2a;
      border-radius: 6px;
    }
    .time-entry .name {
      flex: 1;
      font-size: 14px;
    }
    .time-entry .duration {
      font-weight: bold;
      color: #10b981;
      min-width: 80px;
      text-align: right;
    }
    .timeline-item {
      padding: 15px;
      margin-bottom: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      border-left: 4px solid #10b981;
    }
    .timeline-item .time {
      font-weight: bold;
      color: #10b981;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .timeline-item .description {
      font-size: 14px;
      line-height: 1.5;
      color: #e0e0e0;
    }
    .activity-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      background: #2a2a2a;
      border-radius: 4px;
      font-size: 13px;
      color: #aaa;
      display: flex;
      gap: 10px;
    }
    .activity-item .time {
      color: #666;
      min-width: 80px;
    }
    .activity-item .app {
      color: #888;
      min-width: 120px;
      font-weight: 600;
    }
    .activity-item .title {
      flex: 1;
    }
    .no-data {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 14px;
    }
    textarea {
      width: 100%;
      height: 400px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #e0e0e0;
      padding: 15px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: vertical;
      line-height: 1.6;
    }
    .prompt-description {
      color: #888;
      margin-bottom: 15px;
      font-size: 13px;
      line-height: 1.6;
    }
    .client-item {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .client-item.collapsed {
      padding: 10px 15px;
    }
    .client-item.collapsed .client-details {
      display: none;
    }
    .client-item .client-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .client-item.collapsed .client-header {
      margin-bottom: 0;
    }
    .client-item .client-name-display {
      font-size: 16px;
      font-weight: 600;
      color: #10b981;
      cursor: pointer;
    }
    .client-item .client-name-display:hover {
      color: #059669;
    }
    .client-item .client-buttons {
      display: flex;
      gap: 10px;
    }
    .client-item input {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      margin-bottom: 10px;
    }
    .client-item label {
      display: block;
      color: #888;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .client-item .btn-remove {
      background: #ef4444;
      border-color: #ef4444;
      padding: 6px 12px;
      font-size: 12px;
    }
    .client-item .btn-remove:hover {
      background: #dc2626;
    }
    .client-item .btn-save {
      background: #10b981;
      border-color: #10b981;
      padding: 6px 12px;
      font-size: 12px;
    }
    .client-item .btn-save:hover {
      background: #059669;
    }
    .window-item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      margin-bottom: 8px;
      background: #2a2a2a;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .window-item:hover {
      background: #333;
    }
    .window-item input[type="checkbox"] {
      margin-right: 15px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .window-item .window-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .window-item .window-app {
      font-weight: 600;
      color: #10b981;
      font-size: 14px;
    }
    .window-item .window-title {
      color: #aaa;
      font-size: 13px;
    }
    .report-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      margin-bottom: 10px;
      background: #2a2a2a;
      border-radius: 6px;
      border-left: 4px solid #10b981;
    }
    .report-item .window-info {
      flex: 1;
    }
    .report-item .window-app {
      font-weight: 600;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .report-item .window-title {
      color: #888;
      font-size: 13px;
    }
    .report-item .duration {
      font-size: 20px;
      font-weight: bold;
      color: #10b981;
      min-width: 100px;
      text-align: right;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state h3 {
      color: #888;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }
    .group-container {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 4px solid;
    }
    .group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .group-title-section {
      display: flex;
      align-items: center;
      gap: 15px;
      flex: 1;
    }
    .group-name {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .group-name-input {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
    }
    .group-time {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
    .group-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn-icon {
      padding: 6px 10px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .btn-icon:hover {
      background: #3a3a3a;
    }
    .color-picker {
      width: 32px;
      height: 32px;
      border: 2px solid #3a3a3a;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      padding: 0;
    }
    .color-picker::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-picker::-webkit-color-swatch {
      border: none;
      border-radius: 2px;
    }
    .group-windows {
      min-height: 40px;
      border-radius: 4px;
      padding: 10px;
      background: #0a0a0a;
    }
    .group-windows.drag-over {
      background: #2a2a2a;
      border: 2px dashed #10b981;
    }
    .draggable-window {
      cursor: move;
      opacity: 1;
      transition: opacity 0.2s;
    }
    .draggable-window.dragging {
      opacity: 0.5;
    }
    .unassigned-section {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
    }
    .unassigned-header {
      font-size: 18px;
      font-weight: 600;
      color: #888;
      margin-bottom: 15px;
    }
    .create-group-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .create-group-input {
      flex: 1;
      padding: 10px 15px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>cascayd time tracker</h1>

  <div class="date-selector">
    <label>Date:</label>
    <input type="date" id="dateInput" />
    <button class="btn btn-primary" id="exportBtn">Export Logs</button>
    <button class="btn" id="openFolderBtn">Open Logs Folder</button>
  </div>

  <div class="view-tabs">
    <div class="view-tab active" data-view="report">Report</div>
    <div class="view-tab" data-view="browse">Browse</div>
    <div class="view-tab" data-view="settings">Settings</div>
  </div>

  <div id="reportView" class="view active">
    <div class="section">
      <h2>Tracked Windows Report</h2>
      <div class="sub-text">Showing time spent on selected windows</div>
      <div id="reportContent"></div>
    </div>
  </div>

  <div id="browseView" class="view">
    <div class="section">
      <h2>Browse All Windows</h2>
      <div class="sub-text">Select windows to track for reporting. Sorted by time spent.</div>
      <div id="browseContent"></div>
    </div>
  </div>

  <div id="settingsView" class="view">
    <div class="section">
      <h2>Settings</h2>
      <button class="btn" id="openFolderBtn2" style="margin-top: 15px;">Open Logs Folder</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const dateInput = document.getElementById('dateInput');
    const exportBtn = document.getElementById('exportBtn');
    const openFolderBtn = document.getElementById('openFolderBtn');
    const openFolderBtn2 = document.getElementById('openFolderBtn2');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    let currentDate = today;
    let trackedData = { groups: [], windows: [] };
    let reportWindows = [];

    // View switching
    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        tab.classList.add('active');
        const view = tab.getAttribute('data-view');
        document.getElementById(view + 'View').classList.add('active');

        // Load data for each view
        if (view === 'report') {
          loadReport(currentDate);
        } else if (view === 'browse') {
          loadWindowsList(currentDate);
        }
      });
    });

    // Date change
    dateInput.addEventListener('change', (e) => {
      currentDate = e.target.value;
      loadReport(currentDate);
      loadWindowsList(currentDate);
    });

    // Export
    exportBtn.addEventListener('click', () => {
      ipcRenderer.send('export-logs', currentDate);
    });

    // Open folder
    openFolderBtn.addEventListener('click', () => {
      ipcRenderer.send('open-logs-folder');
    });

    openFolderBtn2.addEventListener('click', () => {
      ipcRenderer.send('open-logs-folder');
    });

    // Format duration helper
    function formatDuration(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }
      return `${minutes}m`;
    }

    // Load report data
    function loadReport(date) {
      ipcRenderer.send('get-report', date);
    }

    // Load windows list for browse tab
    function loadWindowsList(date) {
      ipcRenderer.send('get-windows-list', date);
    }

    // Load tracked windows
    function loadTrackedWindows() {
      ipcRenderer.send('load-tracked-windows');
    }

    // Render report view
    ipcRenderer.on('report-data', (event, data) => {
      reportWindows = data.windows;
      const reportContent = document.getElementById('reportContent');

      if (data.windows.length === 0) {
        reportContent.innerHTML = `
          <div class="empty-state">
            <h3>No tracked windows</h3>
            <p>Go to the Browse tab to select windows you want to track.</p>
          </div>
        `;
        return;
      }

      // Calculate total time
      let totalSeconds = 0;
      data.windows.forEach(w => totalSeconds += w.totalSeconds);

      // Create group button
      const createGroupHtml = `
        <div class="create-group-section">
          <input type="text" class="create-group-input" id="newGroupName" placeholder="New group name...">
          <button class="btn btn-primary" id="createGroupBtn">Create Group</button>
        </div>
      `;

      // Render unassigned windows first
      const unassignedWindows = data.windows.filter(w => !w.groupId);
      const unassignedHtml = unassignedWindows.map(window => `
        <div class="report-item draggable-window" draggable="true"
             data-app="${window.app.replace(/"/g, '&quot;')}"
             data-title="${window.title.replace(/"/g, '&quot;')}">
          <div class="window-info">
            <div class="window-app">${window.app}</div>
            <div class="window-title">${window.title}</div>
          </div>
          <div class="duration">${formatDuration(window.totalSeconds)}</div>
        </div>
      `).join('');

      const unassignedSection = unassignedWindows.length > 0 ? `
        <div class="unassigned-section">
          <div class="unassigned-header">Unassigned Windows (drag into groups below)</div>
          <div class="group-windows" data-group-id="null">
            ${unassignedHtml}
          </div>
        </div>
      ` : '';

      // Render groups below
      let groupsHtml = '';
      data.groups.forEach(group => {
        const groupWindows = data.windows.filter(w => w.groupId === group.id);
        const groupTime = groupWindows.reduce((sum, w) => sum + w.totalSeconds, 0);

        const windowsHtml = groupWindows.map(window => `
          <div class="report-item draggable-window" draggable="true"
               data-app="${window.app.replace(/"/g, '&quot;')}"
               data-title="${window.title.replace(/"/g, '&quot;')}">
            <div class="window-info">
              <div class="window-app">${window.app}</div>
              <div class="window-title">${window.title}</div>
            </div>
            <div class="duration">${formatDuration(window.totalSeconds)}</div>
          </div>
        `).join('');

        groupsHtml += `
          <div class="group-container" style="border-left-color: ${group.color};">
            <div class="group-header">
              <div class="group-title-section">
                <span class="group-name" data-group-id="${group.id}">${group.name}</span>
                <span class="group-time" style="color: ${group.color};">${formatDuration(groupTime)}</span>
              </div>
              <div class="group-actions">
                <input type="color" class="color-picker" value="${group.color}" data-group-id="${group.id}" title="Change color">
                <button class="btn-icon rename-group-btn" data-group-id="${group.id}">Rename</button>
                <button class="btn-icon delete-group-btn" data-group-id="${group.id}">Delete</button>
              </div>
            </div>
            <div class="group-windows" data-group-id="${group.id}">
              ${windowsHtml || '<div class="sub-text">No windows in this group. Drag windows from Unassigned above.</div>'}
            </div>
          </div>
        `;
      });

      reportContent.innerHTML = `
        <div class="big-time">${formatDuration(totalSeconds)}</div>
        <div class="sub-text" style="margin-bottom: 30px;">Total time across ${data.windows.length} tracked windows</div>

        ${createGroupHtml}

        ${unassignedSection}

        ${groupsHtml}
      `;

      // Attach event listeners
      setupDragAndDrop();
      setupGroupActions();
    });

    // Render browse view
    ipcRenderer.on('windows-list-data', (event, data) => {
      const browseContent = document.getElementById('browseContent');

      if (data.length === 0) {
        browseContent.innerHTML = `
          <div class="empty-state">
            <h3>No activity logged</h3>
            <p>No window activity has been recorded for this date.</p>
          </div>
        `;
        return;
      }

      const itemsHtml = data.map((window, index) => `
        <div class="window-item" data-index="${index}">
          <input type="checkbox" ${window.isTracked ? 'checked' : ''}
                 data-app="${window.app.replace(/"/g, '&quot;')}"
                 data-title="${window.title.replace(/"/g, '&quot;')}"
                 data-tracked="${window.isTracked}">
          <div class="window-info">
            <div class="window-app">${window.app}</div>
            <div class="window-title">${window.title}</div>
          </div>
        </div>
      `).join('');

      browseContent.innerHTML = itemsHtml;

      // Add checkbox event listeners
      document.querySelectorAll('.window-item input[type="checkbox"]').forEach(checkbox => {
        checkbox.addEventListener('change', (e) => {
          const app = e.target.getAttribute('data-app');
          const title = e.target.getAttribute('data-title');
          const isTracked = e.target.getAttribute('data-tracked') === 'true';

          ipcRenderer.send('toggle-window-tracking', { app, title, isTracked });
        });
      });
    });

    // Update tracked windows data
    ipcRenderer.on('tracked-windows-data', (event, data) => {
      trackedData = data;
      // Refresh current view
      const activeTab = document.querySelector('.view-tab.active');
      if (activeTab) {
        const view = activeTab.getAttribute('data-view');
        if (view === 'report') {
          loadReport(currentDate);
        } else if (view === 'browse') {
          loadWindowsList(currentDate);
        }
      }
    });

    // Setup drag and drop
    function setupDragAndDrop() {
      const draggables = document.querySelectorAll('.draggable-window');
      const dropZones = document.querySelectorAll('.group-windows');

      draggables.forEach(draggable => {
        draggable.addEventListener('dragstart', (e) => {
          draggable.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', JSON.stringify({
            app: draggable.getAttribute('data-app'),
            title: draggable.getAttribute('data-title')
          }));
        });

        draggable.addEventListener('dragend', () => {
          draggable.classList.remove('dragging');
        });
      });

      dropZones.forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          zone.classList.add('drag-over');
        });

        zone.addEventListener('dragleave', () => {
          zone.classList.remove('drag-over');
        });

        zone.addEventListener('drop', (e) => {
          e.preventDefault();
          zone.classList.remove('drag-over');

          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          const groupId = zone.getAttribute('data-group-id');

          // Assign window to group (null = unassigned)
          ipcRenderer.send('assign-window-to-group', {
            app: data.app,
            title: data.title,
            groupId: groupId === 'null' ? null : groupId
          });
        });
      });
    }

    // Setup group actions
    function setupGroupActions() {
      // Create group button
      const createGroupBtn = document.getElementById('createGroupBtn');
      const newGroupInput = document.getElementById('newGroupName');

      if (createGroupBtn) {
        createGroupBtn.addEventListener('click', () => {
          const groupName = newGroupInput.value.trim();
          if (groupName) {
            ipcRenderer.send('create-group', groupName);
            newGroupInput.value = '';
          }
        });

        newGroupInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            createGroupBtn.click();
          }
        });
      }

      // Color pickers
      document.querySelectorAll('.color-picker').forEach(picker => {
        picker.addEventListener('change', (e) => {
          const groupId = picker.getAttribute('data-group-id');
          const color = e.target.value;
          ipcRenderer.send('change-group-color', { groupId, color });
        });
      });

      // Rename group buttons
      document.querySelectorAll('.rename-group-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const groupId = btn.getAttribute('data-group-id');
          const groupNameEl = document.querySelector(`.group-name[data-group-id="${groupId}"]`);
          const currentName = groupNameEl.textContent;

          const newName = prompt('Enter new group name:', currentName);
          if (newName && newName.trim() !== '' && newName !== currentName) {
            ipcRenderer.send('rename-group', { groupId, newName: newName.trim() });
          }
        });
      });

      // Delete group buttons
      document.querySelectorAll('.delete-group-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const groupId = btn.getAttribute('data-group-id');
          const groupNameEl = document.querySelector(`.group-name[data-group-id="${groupId}"]`);
          const groupName = groupNameEl.textContent;

          if (confirm(`Delete group "${groupName}"? Windows will be moved to Unassigned.`)) {
            ipcRenderer.send('delete-group', groupId);
          }
        });
      });
    }

    // Export complete
    ipcRenderer.on('export-complete', (event, filePath) => {
      alert('Logs exported to: ' + filePath);
    });

    // Initial load
    loadTrackedWindows();
    loadReport(today);
  </script>
</body>
</html>
